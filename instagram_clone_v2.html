<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  :root {
    --ig-bg: #000;
    --ig-white: #121212;
    --ig-border: #262626;
    --ig-text: #fff;
    --ig-muted: #8e8e8e;
    --ig-blue: #0095f6;
    --ig-red: #ed4956;
    --ig-hover: #262626;
    --s1: #f09433;
    --s2: #e6683c;
    --s3: #dc2743;
    --s4: #cc2366;
    --s5: #bc1888;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--ig-bg);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ig-text);
    min-height: 100vh
  }

  .hidden {
    display: none !important
  }

  a {
    color: inherit;
    text-decoration: none
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 600px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .lg-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    opacity: .85
  }

  .login-card {
    position: relative;
    z-index: 2;
    background: rgba(18, 18, 18, .96);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .login-logo {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: block;
    margin-bottom: 6px
  }

  .login-sub {
    font-size: 13px;
    color: var(--ig-muted);
    margin-bottom: 22px
  }

  .acc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px
  }

  .acc-btn {
    background: var(--ig-white);
    border: 1.5px solid var(--ig-border);
    border-radius: 14px;
    padding: 14px 10px;
    cursor: pointer;
    transition: .2s;
    text-align: center;
  }

  .acc-btn:hover {
    border-color: var(--ig-blue);
    box-shadow: 0 4px 14px rgba(0, 149, 246, .15);
    transform: translateY(-2px)
  }

  .acc-av {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    margin: 0 auto 8px;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700
  }

  .acc-nm {
    font-size: 12px;
    font-weight: 700;
    color: var(--ig-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis
  }

  .acc-hd {
    font-size: 11px;
    color: var(--ig-muted)
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--ig-muted);
    font-size: 12px;
    margin: 14px 0
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--ig-border)
  }

  .lg-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--ig-border);
    border-radius: 8px;
    font-size: 14px;
    background: var(--ig-bg);
    margin-bottom: 8px;
    outline: none;
    color: var(--ig-text)
  }

  .lg-input:focus {
    border-color: var(--ig-blue)
  }

  .lg-btn {
    width: 100%;
    padding: 12px;
    background: var(--ig-blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer
  }

  .lg-btn:hover {
    background: #1aa1f7
  }

  .lg-foot {
    margin-top: 14px;
    font-size: 12px;
    color: var(--ig-muted)
  }

  .lg-foot span {
    color: var(--ig-blue);
    cursor: pointer;
    font-weight: 600
  }

  /* ── APP SHELL ── */
  #app {
    min-height: 600px;
    max-width: 480px;
    margin: 0 auto;
    background: var(--ig-bg);
    position: relative;
    display: flex;
    flex-direction: column
  }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--ig-bg);
    border-bottom: 1px solid var(--ig-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    height: 48px;
  }

  .tb-logo {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.5px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer
  }

  .tb-icons {
    display: flex;
    gap: 6px;
    align-items: center
  }

  .ib {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ig-text);
    padding: 6px;
    display: flex;
    align-items: center;
    border-radius: 8px
  }

  .ib:hover {
    background: var(--ig-hover)
  }

  .ib svg {
    width: 24px;
    height: 24px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round
  }

  .ib.filled svg {
    fill: currentColor
  }

  .notif-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 8px;
    height: 8px;
    background: var(--ig-red);
    border-radius: 50%;
    border: 2px solid var(--ig-bg)
  }

  .acc-sw-wrap {
    position: relative
  }

  /* ── ACCOUNT SWITCHER ── */
  .acc-switcher {
    position: absolute;
    top: 40px;
    right: 0;
    background: var(--ig-white);
    border: 1px solid var(--ig-border);
    border-radius: 14px;
    width: 220px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, .5);
    z-index: 300;
    overflow: hidden;
  }

  .sw-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer
  }

  .sw-item:hover {
    background: var(--ig-hover)
  }

  .sw-av {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0
  }

  .sw-info {
    flex: 1;
    overflow: hidden
  }

  .sw-nm {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis
  }

  .sw-hd {
    font-size: 11px;
    color: var(--ig-muted)
  }

  .sw-tick {
    width: 18px;
    height: 18px;
    color: var(--ig-blue);
    flex-shrink: 0
  }

  .sw-add {
    padding: 12px 14px;
    border-top: 1px solid var(--ig-border);
    color: var(--ig-blue);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer
  }

  .sw-add:hover {
    background: rgba(0, 149, 246, .1)
  }

  /* ── STORIES ── */
  .stories {
    display: flex;
    gap: 14px;
    padding: 12px 14px;
    overflow-x: auto;
    border-bottom: 1px solid var(--ig-border)
  }

  .stories::-webkit-scrollbar {
    display: none
  }

  .s-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    flex-shrink: 0
  }

  .s-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    padding: 2.5px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888)
  }

  .s-ring.seen {
    background: #555
  }

  .s-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2.5px solid var(--ig-bg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: var(--ig-hover)
  }

  .s-nm {
    font-size: 11px;
    color: var(--ig-text);
    max-width: 64px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center
  }

  .s-add-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1px solid var(--ig-border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--ig-white)
  }

  .s-add-plus {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    background: var(--ig-blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 16px;
    line-height: 1;
    border: 2px solid var(--ig-bg)
  }

  /* ── FEED ── */
  .feed {
    flex: 1;
    padding-bottom: 80px
  }

  .post {
    border-bottom: 1px solid var(--ig-border)
  }

  .ph {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 10px
  }

  .ph-ring {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    padding: 2px;
    flex-shrink: 0;
    background: linear-gradient(45deg, #f09433, #bc1888)
  }

  .ph-av {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid var(--ig-bg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: var(--ig-hover)
  }

  .ph-info {
    flex: 1
  }

  .ph-user {
    font-size: 14px;
    font-weight: 700;
    cursor: pointer
  }

  .ph-loc {
    font-size: 11px;
    color: var(--ig-muted)
  }

  .ph-more {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ig-text);
    font-size: 20px;
    padding: 4px 8px;
    border-radius: 6px
  }

  .ph-more:hover {
    background: var(--ig-hover)
  }

  /* ── POST IMAGE: AI-generated SVG canvas ── */
  .post-canvas {
    width: 100%;
    aspect-ratio: 1/1;
    display: block;
    overflow: hidden;
    position: relative
  }

  /* ── ACTIONS ── */
  .pactions {
    display: flex;
    align-items: center;
    padding: 10px 12px 6px;
    gap: 14px
  }

  .pab {
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px;
    color: var(--ig-text);
    display: flex;
    align-items: center;
    border-radius: 6px;
    transition: .15s
  }

  .pab:hover {
    background: var(--ig-hover)
  }

  .pab:active {
    transform: scale(1.15)
  }

  .pab svg {
    width: 26px;
    height: 26px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round
  }

  .pab.liked svg {
    stroke: var(--ig-red);
    fill: var(--ig-red)
  }

  .pab.saved svg {
    fill: var(--ig-text);
    stroke: var(--ig-text)
  }

  .save-ml {
    margin-left: auto
  }

  .plikes {
    font-size: 14px;
    font-weight: 700;
    padding: 0 12px 4px
  }

  .pcap {
    font-size: 14px;
    padding: 0 12px 6px;
    line-height: 1.5
  }

  .pcap strong {
    font-weight: 700;
    margin-right: 4px
  }

  .pcmt {
    font-size: 14px;
    color: var(--ig-muted);
    padding: 0 12px 4px;
    cursor: pointer
  }

  .ptime {
    font-size: 11px;
    color: var(--ig-muted);
    padding: 0 12px 12px;
    letter-spacing: .3px
  }

  /* ── FAB (floating post button) ── */
  .fab {
    position: fixed;
    right: 20px;
    bottom: 76px;
    z-index: 200;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #bc1888);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(0, 0, 0, .5);
    transition: .2s;
  }

  .fab:hover {
    transform: scale(1.08)
  }

  .fab:active {
    transform: scale(.95)
  }

  .fab svg {
    width: 24px;
    height: 24px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round
  }

  /* ── BOTTOM NAV ── */
  .bottomnav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--ig-bg);
    border-top: 1px solid var(--ig-border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 56px;
    z-index: 150;
  }

  .nb {
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px;
    color: var(--ig-text);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    transition: .15s
  }

  .nb:hover {
    background: var(--ig-hover)
  }

  .nb.active {
    color: var(--ig-text)
  }

  .nb svg {
    width: 26px;
    height: 26px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round
  }

  .nb.active svg {
    fill: currentColor;
    stroke: currentColor
  }

  .nb-av {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .nb-av-ring {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    padding: 1.5px;
    background: transparent
  }

  .nb.active .nb-av-ring {
    background: linear-gradient(45deg, #f09433, #bc1888)
  }

  /* ── VIEWS ── */
  .view {
    padding-bottom: 70px
  }

  /* Explore grid */
  .exp-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--ig-border)
  }

  .exp-search input {
    width: 100%;
    padding: 9px 14px;
    border: none;
    background: var(--ig-hover);
    color: var(--ig-text);
    border-radius: 10px;
    font-size: 14px;
    outline: none
  }

  .exp-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px
  }

  .exp-cell {
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    position: relative
  }

  .exp-cell svg {
    width: 100%;
    height: 100%;
    display: block
  }

  .exp-cell:hover svg {
    opacity: .85
  }

  /* Reels */
  .reel-item {
    position: relative;
    border-bottom: 1px solid var(--ig-border);
    cursor: pointer
  }

  .reel-thumb {
    width: 100%;
    height: 320px;
    overflow: hidden
  }

  .reel-thumb svg {
    width: 100%;
    height: 100%;
    display: block
  }

  .reel-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px;
    background: linear-gradient(to top, rgba(0, 0, 0, .7), transparent)
  }

  .reel-user {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px
  }

  .reel-av {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    border: 2px solid #000
  }

  .reel-nm {
    color: #fff;
    font-size: 13px;
    font-weight: 700
  }

  .reel-cap {
    color: rgba(255, 255, 255, .9);
    font-size: 13px;
    margin-bottom: 4px
  }

  .reel-stats {
    color: rgba(255, 255, 255, .7);
    font-size: 12px
  }

  /* Profile */
  .prof-header {
    padding: 18px 14px 8px
  }

  .prof-top {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 14px
  }

  .prof-pic {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0
  }

  .prof-stats {
    display: flex;
    gap: 16px;
    flex: 1
  }

  .pstat {
    text-align: center
  }

  .pstat-n {
    font-size: 18px;
    font-weight: 700;
    display: block
  }

  .pstat-l {
    font-size: 12px;
    color: var(--ig-text)
  }

  .prof-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 3px
  }

  .prof-bio {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 12px;
    color: var(--ig-text)
  }

  .prof-btns {
    display: flex;
    gap: 8px;
    margin-bottom: 12px
  }

  .prof-btn {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--ig-border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    background: var(--ig-white);
    color: var(--ig-text);
    cursor: pointer;
    text-align: center
  }

  .prof-btn:hover {
    background: var(--ig-hover)
  }

  .prof-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px
  }

  .prof-cell {
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer
  }

  .prof-cell svg {
    width: 100%;
    height: 100%;
    display: block
  }

  /* Story viewer */
  #sv {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 400;
    display: flex;
    flex-direction: column;
    min-height: 600px
  }

  #sv-canvas {
    flex: 1;
    position: relative
  }

  #sv-canvas svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%
  }

  .sv-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 10px 14px
  }

  .sv-bars {
    display: flex;
    gap: 4px;
    margin-bottom: 10px
  }

  .sv-bar {
    flex: 1;
    height: 3px;
    background: rgba(255, 255, 255, .3);
    border-radius: 2px;
    overflow: hidden
  }

  .sv-fill {
    height: 100%;
    background: #fff;
    width: 0;
    transition: width 4s linear
  }

  .sv-hdr {
    display: flex;
    align-items: center;
    gap: 10px
  }

  .sv-av {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px
  }

  .sv-nm {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    flex: 1
  }

  .sv-tm {
    color: rgba(255, 255, 255, .7);
    font-size: 12px
  }

  .sv-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 26px;
    cursor: pointer;
    padding: 0 4px
  }

  /* Upload modal */
  #upload-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .7);
    z-index: 350;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .up-modal {
    background: var(--ig-white);
    border-radius: 22px 22px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 28px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }

  /* sticky header for upload */
  .up-header-sticky {
    position: sticky;
    top: 0;
    background: var(--ig-white);
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    margin-bottom: 5px;
    border-bottom: 1px solid var(--ig-border);
  }

  .up-handle {
    width: 38px;
    height: 4px;
    background: var(--ig-border);
    border-radius: 2px;
    margin: 0 auto 10px;
  }

  .up-title {
    font-size: 16px;
    font-weight: 700;
  }

  .up-zone {
    border: 2px dashed var(--ig-border);
    border-radius: 14px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: .2s;
    background: var(--ig-bg);
    margin-bottom: 14px;
    margin-top: 10px;
  }

  .up-zone:hover {
    border-color: var(--ig-blue);
    background: rgba(0, 149, 246, .1)
  }

  .up-zone-icon {
    font-size: 44px;
    margin-bottom: 10px
  }

  .up-zone p {

    const themes = {

      const div = document.createElement('div');
      div.id = 'shield-' + pid; div.className = 'shield-ok-banner';
      div.innerHTML = '<span>🔍</span> Scanning face registry…';
      const act = pEl.querySelector('.pactions');
      if (act) act.before(div);
    }
    shieldCheck(uploadImg).then(result => {
      result.postedBy = CU.handle;
      const bEl = document.getElementById('shield-' + pid);
      if (!bEl) return;
      if (result.flagged) {
        const ults = shieldULTs();
        bEl.className = 'shield-banner';
        bEl.onclick = () => showEvidenceModal(result, pid);
        bEl.innerHTML = `<div class="shield-icon">🚨</div><div>
          <div class="shield-title">⚠️ Unauthorized Face Use Detected</div>
          <div class="shield-sub">Registered face of <strong style="color:#fff">${result.registeredUser || 'enrolled user'}</strong> found.<br>${ults.length ? 'No ULT covers SovereignGram.' : 'No Usage License Token for this platform.'}</div>
          <div class="shield-meta">Match: ${result.confidence} · AI: ${result.isAI ? 'YES' : 'POSSIBLE'} · ${(result.reason || '').slice(0, 55)} — Tap for evidence</div></div>`;
        toast('🚨 Unauthorized face detected — tap the banner for evidence');
        const pill = document.getElementById('shield-pill');
        if (pill) { pill.style.borderColor = 'rgba(237,73,86,0.7)'; pill.style.background = 'rgba(237,73,86,0.3)'; }
      } else {
        bEl.innerHTML = '✅ Sovereign Shield: No registered face match';
        setTimeout(() => { if (bEl.parentNode) bEl.style.display = 'none'; }, 3000);
        toast('Post shared! ✨');
      }
    });
  }

  initShield();

</script>
